# ══════════════════════════════════════════════════════════════════════════════
# GitHub Actions: Build Frontend + Deploy to cPanel via FTP
# Triggers automatically when you push changes to app/, components/, lib/ etc.
# Builds Next.js → exports static HTML → uploads to afterme.life via FTP
# ══════════════════════════════════════════════════════════════════════════════

name: Build & Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'dictionaries/**'
      - 'public/**'
      - 'next.config.js'
      - 'tailwind.config.js'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'

  # Manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Next.js + Upload to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Get the code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build Next.js (static export) ──────────────────────────────────────
      - name: Build Next.js
        run: npm run build
        env:
          # Firebase config — stored as GitHub Secrets, injected at build time
          NEXT_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:      ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_APP_URL:                      https://afterme.life

      # ── 5. Upload to cPanel via FTP ────────────────────────────────────────────
      - name: Deploy to cPanel (FTP upload)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_SERVER }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./out/
          server-dir:       /meafterme/
          dangerous-clean-slate: false   # Don't delete existing files first
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      # ── 6. Notify on success ───────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "✅ Frontend deployed successfully to afterme.life"
          echo "🌐 URL: https://afterme.life"
          echo "📦 Build size: $(du -sh out/ | cut -f1)"
