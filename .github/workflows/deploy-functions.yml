# ══════════════════════════════════════════════════════════════════════════════
# GitHub Actions: Deploy Firebase Cloud Functions
# Triggers automatically when you push changes to functions/ folder
# No local PC needed — runs 100% in GitHub's cloud
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Get the code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      # ── 3. Install & build Cloud Functions ───────────────────────────────────
      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Functions (TypeScript → JavaScript)
        run: npm run build
        working-directory: functions

      # ── 4. Deploy everything to Firebase ─────────────────────────────────────
      - name: Deploy Functions + Firestore Rules + Indexes
        uses: FirebaseExtended/action-hosting-deploy@v0
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: meafterme-d0347
          channelId: live
        # Use direct firebase-tools deploy instead:
        continue-on-error: true

      # Alternative deploy step using firebase-tools directly
      - name: Deploy via Firebase CLI
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions,firestore --project meafterme-d0347 --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          # API keys are injected as Firebase Secrets (NOT passed here)
          # They are set once via Firebase Console → never stored in GitHub
