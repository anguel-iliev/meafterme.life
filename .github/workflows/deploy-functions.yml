# ══════════════════════════════════════════════════════════════════════════════
# GitHub Actions — Deploy Firebase Functions + Rules
#
# Необходими GitHub Secrets:
#   FIREBASE_TOKEN, OPENAI_API_KEY, ANTHROPIC_API_KEY,
#   ELEVENLABS_API_KEY, DID_API_KEY
# ══════════════════════════════════════════════════════════════════════════════

name: 🔥 Deploy Firebase Functions & Rules

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: 📦 Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: 🔨 Build Functions (TypeScript → JavaScript)
        run: npm run build
        working-directory: functions

      - name: 🔥 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔑 Set Firebase Secrets from GitHub Secrets
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo -n "$OPENAI_API_KEY" | firebase functions:secrets:set OPENAI_API_KEY \
              --project meafterme-d0347 --token "$FIREBASE_TOKEN" --force
            echo "✅ OPENAI_API_KEY set"
          else
            echo "⚠️ OPENAI_API_KEY not in GitHub Secrets — skipping"
          fi
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo -n "$ANTHROPIC_API_KEY" | firebase functions:secrets:set ANTHROPIC_API_KEY \
              --project meafterme-d0347 --token "$FIREBASE_TOKEN" --force
            echo "✅ ANTHROPIC_API_KEY set"
          else
            echo "⚠️ ANTHROPIC_API_KEY not in GitHub Secrets — skipping"
          fi
          if [ -n "$ELEVENLABS_API_KEY" ]; then
            echo -n "$ELEVENLABS_API_KEY" | firebase functions:secrets:set ELEVENLABS_API_KEY \
              --project meafterme-d0347 --token "$FIREBASE_TOKEN" --force
            echo "✅ ELEVENLABS_API_KEY set"
          else
            echo "⚠️ ELEVENLABS_API_KEY not in GitHub Secrets — skipping"
          fi
          if [ -n "$DID_API_KEY" ]; then
            echo -n "$DID_API_KEY" | firebase functions:secrets:set DID_API_KEY \
              --project meafterme-d0347 --token "$FIREBASE_TOKEN" --force
            echo "✅ DID_API_KEY set"
          else
            echo "⚠️ DID_API_KEY not in GitHub Secrets — skipping"
          fi
        env:
          FIREBASE_TOKEN:     ${{ secrets.FIREBASE_TOKEN }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          DID_API_KEY:        ${{ secrets.DID_API_KEY }}

      - name: 🚀 Deploy Functions + Firestore + Storage Rules
        run: |
          firebase deploy \
            --only functions,firestore,storage \
            --project meafterme-d0347 \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: ✅ Done
        run: echo "✅ Firebase Functions and Rules deployed successfully"
