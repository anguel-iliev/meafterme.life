# ══════════════════════════════════════════════════════════════════════════════
# GitHub Actions — Deploy Firebase Functions + Rules
#
# Как работи:
#   1. Ти промениш нещо в functions/ или *.rules и пишеш: git push
#   2. GitHub автоматично деплойва Functions, Firestore rules, Storage rules
#   3. Никога повече CMD или PowerShell за деплой
#
# Необходими GitHub Secrets (Settings → Secrets → Actions):
#   FIREBASE_TOKEN  — генерира се ВЕДНЪЖ с: firebase login:ci
#                     Пусни тази команда локално и постави токена в GitHub Secrets
# ══════════════════════════════════════════════════════════════════════════════

name: 🔥 Deploy Firebase Functions & Rules

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'

  # Ръчен старт от GitHub UI → Actions → Run workflow
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: 📦 Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: 🔨 Build Functions (TypeScript → JavaScript)
        run: npm run build
        working-directory: functions

      - name: 🔥 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🚀 Deploy Functions + Firestore + Storage Rules
        run: |
          firebase deploy \
            --only functions,firestore,storage \
            --project meafterme-d0347 \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: ✅ Done
        run: echo "✅ Firebase Functions and Rules deployed successfully"
